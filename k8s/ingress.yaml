apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ssp-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: ssp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssp-service
                port:
                  number: 80
